name: Playwright UI Tests 🎭

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Для UI-тестов стабильная 3.11 — лучший выбор

    # Модифицировано под ваш новый стек: компилируем зависимости через pip-tools
    - name: Install dependencies via pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools
        pip-compile requirements/requirements.in
        pip install -r requirements/requirements.txt

    # СТРОГО ОБЯЗАТЕЛЬНО ДЛЯ UI: Скачиваем браузер Chromium в контейнер Ubuntu
    - name: Install Playwright Chromium Browser
      run: |
        playwright install --with-deps chromium

    - name: Run Pytest with Allure
      run: |
        pytest -v --alluredir=allure-results
      continue-on-error: true

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4 # Используем свежую v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
